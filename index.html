<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Maya</title>
<meta name="description" content="Registro de salud y cuidados de Maya">
<meta name="theme-color" content="#fbf7f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Maya">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-card">
    <div class="login-icon">💗</div>
    <h1>Maya</h1>
    <p class="login-sub">El diario de nuestra bebé</p>
    <form id="login-form">
      <input type="text" id="login-user" placeholder="Correo" autocomplete="username" inputmode="email" autocapitalize="none" required>
      <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password" required>
      <button type="submit" class="btn-primary btn-block">Entrar</button>
    </form>
    <p id="login-error" class="login-error hidden">Usuario o contraseña incorrectos</p>
  </div>
</div>

<!-- ====== APP ====== -->
<div id="app" class="app hidden">

  <a class="skip-link" href="#main">Ir al contenido</a>

  <div id="ptr" class="ptr"><span class="ptr-spinner">💗</span></div>

  <header class="app-header">
    <div class="header-left" id="header-refresh" title="Tocar para sincronizar">
      <img id="header-avatar" class="header-avatar hidden" alt="">
      <div>
        <h1 id="header-title">Maya</h1>
        <p id="header-sub" class="header-sub"></p>
      </div>
    </div>
    <div class="header-right">
      <span id="sync-dot" class="sync-dot" role="status" aria-label="Estado de sincronización" title="Sincronización"></span>
      <button id="btn-privacy" class="icon-btn privacy-btn" type="button" aria-label="Activar modo discreto" aria-pressed="false">◉</button>
      <button id="btn-settings" class="icon-btn" type="button" aria-label="Ajustes">⚙️</button>
    </div>
  </header>

  <div id="bebes-bar" class="bebes-bar hidden"></div>

  <!-- Banner de timers activos (lactancia / sueño) -->
  <div id="active-timers" class="active-timers"></div>

  <main id="main" class="main" tabindex="-1"></main>

  <nav class="tabbar" aria-label="Secciones principales">
    <button type="button" class="tab active" data-tab="inicio" aria-current="page"><span class="tab-icon">🏠</span><span>Inicio</span></button>
    <button type="button" class="tab" data-tab="comida"><span class="tab-icon">🍼</span><span>Comida</span></button>
    <button type="button" class="tab" data-tab="sueno"><span class="tab-icon">🌙</span><span>Sueño</span></button>
    <button type="button" class="tab" data-tab="panal"><span class="tab-icon">💧</span><span>Pañal</span></button>
    <button type="button" class="tab" data-tab="retos"><span class="tab-icon">🏆</span><span>Retos</span></button>
    <button type="button" class="tab" data-tab="mas"><span class="tab-icon">✨</span><span>Más</span></button>
  </nav>

</div>

<!-- ====== HOJA MODAL ====== -->
<div id="sheet-backdrop" class="sheet-backdrop hidden" role="presentation"></div>
<div id="sheet" class="sheet hidden" role="dialog" aria-modal="true" aria-label="Formulario" tabindex="-1">
  <div class="sheet-handle"></div>
  <button id="sheet-close" class="sheet-close" type="button" aria-label="Cerrar formulario">×</button>
  <div id="sheet-content"></div>
</div>

<div id="toast" class="toast hidden" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- canvas oculto para gráficas del PDF -->
<canvas id="pdf-canvas" width="900" height="450" style="display:none"></canvas>

<script src="js/vendor/chart.umd.min.js"></script>
<script src="js/vendor/jspdf.umd.min.js"></script>
<script src="js/vendor/jspdf.plugin.autotable.min.js"></script>
<script src="js/store.js"></script>
<script src="js/actividades.js"></script>
<script src="js/analisis.js"></script>
<script src="js/epds.js"></script>
<script src="js/info.js"></script>
<script src="js/pdf.js"></script>
<script src="js/app.js"></script>
</body>
</html>
