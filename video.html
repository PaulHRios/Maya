<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- página oculta: no aparece en buscadores, solo se llega por el link directo -->
<meta name="robots" content="noindex, nofollow">
<title>Maya — Demo Video</title>
<meta name="theme-color" content="#fff5f8">
<style>
  :root { --pink: #f06a9b; --pink-deep: #d94f84; --text: #2b2330; --text-2: #7a6f77; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100dvh; color: var(--text);
    background: linear-gradient(160deg, #ffe9f2 0%, #fff5f8 45%, #f3edff 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 20px; text-align: center; overflow-x: hidden;
  }
  .wrap { width: 100%; max-width: 760px; }
  .icon { font-size: 52px; animation: latido 2.6s ease-in-out infinite; }
  h1 { font-size: 40px; font-weight: 800; letter-spacing: -.5px; margin-top: 4px; }
  .sub { color: var(--text-2); font-weight: 600; font-size: 16px; margin: 4px 0 22px; }
  /* marco de video 16:9 responsivo */
  .video {
    position: relative; width: 100%; aspect-ratio: 16 / 9;
    border-radius: 22px; overflow: hidden;
    box-shadow: 0 18px 50px rgba(180, 80, 130, .28);
    background: #000;
  }
  .video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .cta {
    display: inline-block; margin-top: 24px; text-decoration: none;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep)); color: #fff;
    font-weight: 800; font-size: 16px; padding: 15px 30px; border-radius: 100px;
    box-shadow: 0 10px 26px rgba(240, 106, 155, .4);
  }
  .foot { margin-top: 22px; font-size: 13px; color: var(--text-2); }
  .foot a { color: var(--pink-deep); }
  @keyframes latido { 0%,100%{transform:scale(1)} 12%{transform:scale(1.12)} 24%{transform:scale(1)} 36%{transform:scale(1.08)} 48%{transform:scale(1)} }
  @media (prefers-reduced-motion: reduce) { .icon { animation: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon">💗</div>
    <h1>Maya</h1>
    <p class="sub">The baby tracker two parents built for their newborn</p>

    <!-- ============================================================
         PARA CAMBIAR EL VIDEO: reemplaza el ID (5siIOzBKkfc) por el
         de tu video de YouTube. El ID es lo que va después de
         youtu.be/  o de  watch?v=
         Ejemplo:  https://youtu.be/AbCdEfGhIjK  →  el ID es AbCdEfGhIjK
    ============================================================ -->
    <div class="video">
      <iframe
        src="https://www.youtube-nocookie.com/embed/5siIOzBKkfc?rel=0"
        title="Maya demo video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen></iframe>
    </div>

    <a class="cta" href="./demo.html">🧪 Try the live demo</a>

    <p class="foot">Made with love for our newborn 💗 · <a href="https://paulhrios.github.io/Maya/">open the app</a></p>
  </div>
</body>
</html>
